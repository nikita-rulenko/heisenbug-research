<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Онбординг разработчика · стоимость по регионам</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,500;1,9..144,900&family=JetBrains+Mono:wght@500;700&display=swap"
  rel="stylesheet">
<style>
  /* ────────── tokens ─────────────────────────────── */
  :root {
    --paper:      #F3ECDE;
    --ink:        #0D0C0A;
    --ink-soft:   #3C3A33;
    --rule:       #2A2620;
    --accent:     #C0281F;

    --slide-w: 1920px;
    --slide-h: 1080px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { background: var(--paper); }
  body { color: var(--ink); font-family: "Fraunces", serif; }

  /* preview-режим (добавить #preview к URL) */
  body.preview { background: #1a1814; display: grid; place-items: center; padding: 40px; min-height: 100vh; }
  body.preview .slide {
    box-shadow: 0 40px 120px rgba(0,0,0,0.45), 0 10px 30px rgba(0,0,0,0.25);
  }

  .slide {
    position: relative;
    width: var(--slide-w); height: var(--slide-h);
    background: var(--paper);
    overflow: hidden;
  }

  /* paper grain */
  .slide::before {
    content: "";
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.05  0 0 0 0 0.04  0 0 0 0 0.03  0 0 0 0.18 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.55;
    mix-blend-mode: multiply;
    pointer-events: none;
  }

  /* одна красная «правило» сверху слева — тихий акцент */
  .accent-rule {
    position: absolute;
    left: 120px;
    top: 72px;
    width: 96px;
    height: 6px;
    background: var(--accent);
  }

  /* ────────── hero ─────────────────────────────── */
  .title {
    position: absolute;
    top: 100px;
    left: 120px;
    right: 120px;
    font-family: "Fraunces", serif;
    font-variation-settings: "opsz" 144;
    font-weight: 900;
    font-style: italic;
    font-size: 140px;
    line-height: 0.9;
    letter-spacing: -0.04em;
    color: var(--ink);
  }
  .title em { color: var(--accent); font-style: italic; font-weight: 900; }

  /* ────────── таблица ─────────────────────────────── */
  .data {
    position: absolute;
    left: 120px;
    right: 120px;
    bottom: 96px;
  }

  .head {
    display: grid;
    grid-template-columns: 1fr 380px 460px;
    align-items: baseline;
    padding-bottom: 18px;
    border-bottom: 3px solid var(--rule);
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .head span:nth-child(2),
  .head span:nth-child(3) { text-align: right; }
  .head span:nth-child(1) { color: var(--accent); font-weight: 700; }

  .row {
    display: grid;
    grid-template-columns: 1fr 380px 460px;
    align-items: baseline;
    padding: 22px 0 18px;
    border-bottom: 1px solid rgba(42,38,32,0.22);
    opacity: 0;
    transform: translateY(16px);
    animation: reveal 0.7s cubic-bezier(.22,.72,.31,1) forwards;
  }
  .row:nth-of-type(1) { animation-delay: 0.10s; }
  .row:nth-of-type(2) { animation-delay: 0.20s; }
  .row:nth-of-type(3) { animation-delay: 0.30s; }
  .row:nth-of-type(4) { animation-delay: 0.40s; }
  .row:nth-of-type(5) { animation-delay: 0.50s; }

  @keyframes reveal {
    to { opacity: 1; transform: translateY(0); }
  }

  .name {
    font-family: "Fraunces", serif;
    font-variation-settings: "opsz" 96;
    font-weight: 700;
    font-style: italic;
    font-size: 52px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  .setup {
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: 32px;
    letter-spacing: -0.01em;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
    text-align: right;
  }

  .onb {
    font-family: "JetBrains Mono", monospace;
    font-weight: 700;
    font-size: 54px;
    letter-spacing: -0.035em;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .onb .unit {
    font-size: 36px;
    font-weight: 500;
    color: var(--ink-soft);
    margin-left: 2px;
  }

  /* print */
  @media print {
    html, body { background: var(--paper); }
    .slide { box-shadow: none; }
    .row { animation: none; opacity: 1; transform: none; }
  }
</style>
</head>
<body>
<script>
  if (location.hash === "#preview") document.body.classList.add("preview");
</script>

<div class="slide" aria-label="Слайд: стоимость онбординга разработчика по регионам">

  <div class="accent-rule" aria-hidden="true"></div>

  <h1 class="title">
    Сколько стоит<br>
    <em>онбординг</em> разработчика
  </h1>

  <section class="data" aria-label="Стоимость онбординга по регионам">
    <div class="head" aria-hidden="true">
      <span>Регион</span>
      <span>Сетап</span>
      <span>В&nbsp;месяц</span>
    </div>

    <div class="row">
      <div class="name">Европа</div>
      <div class="setup">€&nbsp;3–5k</div>
      <div class="onb">€&nbsp;7–10<span class="unit">k</span></div>
    </div>

    <div class="row">
      <div class="name">США</div>
      <div class="setup">$&nbsp;1–2k</div>
      <div class="onb">$&nbsp;20<span class="unit">k</span></div>
    </div>

    <div class="row">
      <div class="name">Россия</div>
      <div class="setup">50–80k&nbsp;₽</div>
      <div class="onb">100–250<span class="unit">k&nbsp;₽</span></div>
    </div>

    <div class="row">
      <div class="name">Азия</div>
      <div class="setup">$&nbsp;1–2k</div>
      <div class="onb">$&nbsp;3–5<span class="unit">k</span></div>
    </div>

    <div class="row">
      <div class="name">Глобально</div>
      <div class="setup">$&nbsp;1–3k</div>
      <div class="onb">$&nbsp;4–8<span class="unit">k</span></div>
    </div>
  </section>

</div>
</body>
</html>
