<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>У меня большой проект · боль легаси</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,700;0,800;1,400;1,500;1,700;1,800&family=PT+Mono&display=swap"
  rel="stylesheet">
<style>
  /* ────────── tokens ─────────────────────────────── */
  :root {
    --bg:        #0F2417;        /* deep forest — почти-чёрный зелёный */
    --bg-2:      #162E1F;
    --bg-deep:   #081710;
    --cream:     #F2E8CC;
    --cream-dim: #C2B78F;
    --cream-mute:#7D7858;
    --gold:      #D9A74C;
    --gold-soft: rgba(217,167,76,0.22);
    --rule:      rgba(242,232,204,0.22);

    --slide-w: 1920px;
    --slide-h: 1080px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { background: var(--bg-deep); }
  body { color: var(--cream); font-family: "Spectral", serif; }

  body.preview { background: #050807; display: grid; place-items: center; padding: 40px; min-height: 100vh; }
  body.preview .slide { box-shadow: 0 60px 180px rgba(0,0,0,0.9), 0 15px 40px rgba(0,0,0,0.5); }

  .slide {
    position: relative;
    width: var(--slide-w); height: var(--slide-h);
    background:
      radial-gradient(ellipse 85% 65% at 50% 55%, rgba(22,46,31,1) 0%, var(--bg) 55%, var(--bg-deep) 100%);
    overflow: hidden;
  }

  /* grain */
  .slide::before {
    content: "";
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='280' height='280'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.92  0 0 0 0 0.78  0 0 0 0.09 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    mix-blend-mode: screen;
    opacity: 0.85;
    pointer-events: none;
    z-index: 20;
  }

  /* giant decorative quote mark backdrop */
  .glyph {
    position: absolute;
    font-family: "Spectral", serif;
    font-style: italic;
    font-weight: 800;
    font-size: 1400px;
    line-height: 0.7;
    color: var(--gold);
    opacity: 0.12;
    user-select: none;
    pointer-events: none;
    z-index: 1;
    letter-spacing: -0.04em;
  }
  .glyph.left {
    top: -80px;
    left: -120px;
  }
  .glyph.right {
    bottom: -520px;
    right: -80px;
  }

  /* vignette on edges */
  .slide::after {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 90% 80% at 50% 50%, transparent 60%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
    z-index: 2;
  }

  /* ────────── top bar ───────────────────────────── */
  .top {
    position: absolute;
    top: 56px;
    left: 96px; right: 96px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: "PT Mono", monospace;
    font-size: 18px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--cream-mute);
    z-index: 4;
  }
  .top .lhs { display: inline-flex; align-items: center; gap: 16px; flex-shrink: 0; }
  .top .mark {
    display: inline-block;
    width: 12px; height: 12px;
    background: var(--gold);
    transform: rotate(45deg);
  }
  .top .rule { flex: 1; height: 1px; background: var(--rule); margin: 0 26px; }
  .top .rhs { color: var(--cream-dim); font-weight: 700; letter-spacing: 0.32em; flex-shrink: 0; }

  /* ────────── hero ──────────────────────────────── */
  .hero {
    position: absolute;
    top: 220px;
    left: 96px;
    right: 96px;
    z-index: 4;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 18px;
    font-family: "PT Mono", monospace;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.36em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 32px;
  }
  .eyebrow .line {
    width: 80px; height: 2px;
    background: var(--gold);
  }

  .title {
    font-family: "Spectral", serif;
    font-weight: 800;
    font-style: italic;
    font-size: 168px;
    line-height: 0.95;
    letter-spacing: -0.025em;
    color: var(--cream);
    max-width: 1600px;
  }
  .title .openq, .title .closeq {
    color: var(--gold);
    font-weight: 800;
    font-style: italic;
    display: inline-block;
  }
  .title .openq { margin-right: 10px; transform: translate(-8px, 24px); }
  .title .closeq { margin-left: 6px; transform: translate(0, 24px); }

  .attribution {
    margin-top: 34px;
    font-family: "Spectral", serif;
    font-style: italic;
    font-weight: 400;
    font-size: 28px;
    color: var(--cream-dim);
    letter-spacing: 0.005em;
  }
  .attribution .em {
    font-family: "PT Mono", monospace;
    font-style: normal;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold);
    margin-right: 12px;
  }

  /* ────────── divider + subtitle ───────────────── */
  .rule-block {
    position: absolute;
    left: 96px; right: 96px;
    top: 830px;
    z-index: 4;
    display: flex;
    align-items: center;
    gap: 28px;
  }
  .rule-block .line {
    flex: 0 0 140px;
    height: 2px;
    background: var(--gold);
  }
  .rule-block .dia {
    width: 14px; height: 14px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  .subtitle {
    position: absolute;
    left: 96px; right: 96px;
    top: 870px;
    z-index: 4;
    font-family: "Spectral", serif;
    font-weight: 700;
    font-size: 58px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    color: var(--cream);
  }
  .subtitle .mute { color: var(--cream-dim); font-weight: 500; font-style: italic; }
  .subtitle .hit { color: var(--gold); font-weight: 700; font-style: italic; }

  /* ────────── footer ────────────────────────────── */
  .footer {
    position: absolute;
    bottom: 42px;
    left: 96px; right: 96px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: "PT Mono", monospace;
    font-size: 16px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--cream-mute);
    z-index: 4;
  }
  .footer .mid { color: var(--gold); font-weight: 700; letter-spacing: 0.3em; }
</style>
</head>
<body>
<script>
  if (location.hash === "#preview") document.body.classList.add("preview");
</script>

<div class="slide" aria-label="Слайд: у меня большой проект и много кода">

  <div class="glyph left" aria-hidden="true">«</div>
  <div class="glyph right" aria-hidden="true">»</div>

  <div class="top">
    <div class="lhs">
      <span class="mark" aria-hidden="true"></span>
      <span>Chapter · Legacy</span>
    </div>
    <div class="rule" aria-hidden="true"></div>
    <div class="rhs">§&nbsp;04&nbsp;·&nbsp;Heisenbug&nbsp;2026</div>
  </div>

  <div class="hero">
    <div class="eyebrow">
      <span class="line" aria-hidden="true"></span>
      <span>Знакомая жалоба</span>
    </div>

    <div class="title">
      <span class="openq">«</span>У&nbsp;меня большой проект<br>
      и&nbsp;много кода!<span class="closeq">»</span>
    </div>

    <div class="attribution">
      <span class="em">#1</span>первое, что слышишь на&nbsp;любом онбординге
    </div>
  </div>

  <div class="rule-block" aria-hidden="true">
    <span class="line"></span>
    <span class="dia"></span>
    <span class="line"></span>
  </div>

  <div class="subtitle">
    <span class="mute">Боль</span> <span class="hit">легаси</span>
    <span class="mute">и&nbsp;отсутствия</span> <span class="hit">документации</span><span class="mute">.</span>
  </div>

  <div class="footer">
    <div>Helixir · Context Recovery</div>
    <div class="mid">Чем старше код&nbsp;—&nbsp;тем глуше контекст</div>
    <div>стр. 04 / Heisenbug 2026</div>
  </div>

</div>
</body>
</html>
