<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Цели онбординга · проект после</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&family=Inter+Tight:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
  rel="stylesheet">
<style>
  :root {
    --washi:        #ECE6D9;
    --washi-2:      #E2DBCB;
    --sumi:         #16140F;
    --sumi-soft:    #4A463C;
    --sumi-mute:    #8A8372;
    --seal:         #A8321D;
    --gold-leaf:    #B8923A;
    --rule:         rgba(22,20,15,0.22);
    --rule-hair:    rgba(22,20,15,0.12);

    --slide-w: 1920px;
    --slide-h: 1080px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--washi); }
  body { color: var(--sumi); font-family: "Inter Tight", system-ui, sans-serif; }
  body.preview { background: #0E0D0A; display: grid; place-items: center; padding: 40px; min-height: 100vh; }
  body.preview .slide { box-shadow: 0 60px 140px rgba(0,0,0,0.55), 0 15px 40px rgba(0,0,0,0.35); }

  .slide {
    position: relative;
    width: var(--slide-w); height: var(--slide-h);
    background:
      radial-gradient(ellipse 80% 60% at 90% 110%, rgba(168,50,29,0.06), transparent 60%),
      radial-gradient(ellipse 60% 50% at 0% -10%, rgba(184,146,58,0.08), transparent 60%),
      var(--washi);
    overflow: hidden;
  }

  /* washi fibers */
  .slide::before {
    content: ""; position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='260' height='260'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.09  0 0 0 0 0.08  0 0 0 0 0.06  0 0 0 0.10 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    mix-blend-mode: multiply;
    opacity: 0.55;
    pointer-events: none;
    z-index: 20;
  }

  /* giant kanji backdrop */
  .glyph {
    position: absolute;
    right: -80px; bottom: -180px;
    font-family: "EB Garamond", serif;
    font-weight: 400;
    font-size: 1100px;
    line-height: 0.8;
    color: var(--seal);
    opacity: 0.055;
    user-select: none; pointer-events: none;
    z-index: 0;
  }

  /* ────────── minimal top row ─────────────────── */
  .brand {
    position: absolute;
    top: 58px; left: 104px;
    display: inline-flex; align-items: center; gap: 14px;
    font-family: "JetBrains Mono", monospace;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--sumi);
    z-index: 4;
  }
  .brand .mark { width: 11px; height: 11px; background: var(--seal); display: inline-block; }

  .lang {
    position: absolute;
    top: 46px; right: 104px;
    display: inline-flex;
    font-family: "JetBrains Mono", monospace;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.16em;
    z-index: 10;
    border: 1.5px solid var(--sumi);
    background: var(--washi);
  }
  .lang .seg { padding: 8px 14px; color: var(--sumi); display: inline-block; }
  .lang .seg.active { background: var(--sumi); color: var(--washi); }
  .lang .sep { width: 1.5px; align-self: stretch; background: var(--sumi); }

  /* ────────── title hero ─────────────────────── */
  .title {
    position: absolute;
    top: 140px;
    left: 104px;
    right: 104px;
    z-index: 4;
    font-family: "EB Garamond", serif;
    font-weight: 500;
    font-size: 148px;
    line-height: 0.9;
    letter-spacing: -0.03em;
    color: var(--sumi);
  }
  .title .it { font-style: italic; font-weight: 500; color: var(--seal); }
  .title .amp {
    font-style: italic; font-weight: 400;
    color: var(--gold-leaf);
    display: inline-block;
    transform: translateY(0.04em);
    margin: 0 8px;
  }
  .title .period { color: var(--seal); }

  /* ────────── goals — hero list ─────────────────── */
  .goals {
    position: absolute;
    top: 358px;
    left: 104px;
    right: 104px;
    bottom: 120px;
    z-index: 4;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-auto-rows: 1fr;
    column-gap: 64px;
    row-gap: 0;
  }

  .goal {
    display: grid;
    grid-template-columns: 110px 1fr;
    column-gap: 26px;
    padding: 20px 0;
    align-items: center;
    border-top: 1px solid var(--rule-hair);
  }
  /* bottom border on last row of each column */
  .goals .goal:nth-last-child(-n+2) { border-bottom: 1px solid var(--rule-hair); }

  .goal .idx {
    font-family: "EB Garamond", serif;
    font-style: italic;
    font-weight: 500;
    font-size: 92px;
    line-height: 1;
    color: var(--seal);
    letter-spacing: -0.04em;
  }
  .goal .body {
    font-family: "Inter Tight", sans-serif;
    font-weight: 600;
    font-size: 38px;
    line-height: 1.08;
    color: var(--sumi);
    letter-spacing: -0.02em;
  }
  .goal .body .hit {
    font-family: "EB Garamond", serif;
    font-style: italic;
    font-weight: 600;
    color: var(--seal);
    font-size: 1.18em;
    letter-spacing: -0.02em;
  }

  /* ────────── seal (decorative, no inner text) ─── */
  .seal-mark {
    position: absolute;
    right: 104px;
    bottom: 90px;
    width: 116px; height: 116px;
    transform: rotate(-8deg);
    z-index: 5;
    pointer-events: none;
  }
  .seal-mark .outer {
    position: absolute; inset: 0;
    border: 3px solid var(--seal);
    border-radius: 50%;
  }
  .seal-mark .inner {
    position: absolute; inset: 9px;
    border: 1.5px solid var(--seal);
    border-radius: 50%;
    opacity: 0.6;
  }
  .seal-mark .kanji {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    font-family: "EB Garamond", serif;
    font-weight: 700;
    font-size: 52px;
    line-height: 1;
    color: var(--seal);
  }
</style>
</head>
<body>
<script>
  if (location.hash === "#preview") document.body.classList.add("preview");
</script>

<div class="slide" aria-label="Цели онбординга — проект после">
  <div class="glyph" aria-hidden="true">目</div>

  <div class="brand">
    <span class="mark" aria-hidden="true"></span>
    <span>Helixir · Context Recovery</span>
  </div>

  <div class="lang" aria-label="Язык">
    <span class="seg active">RU</span>
    <span class="sep" aria-hidden="true"></span>
    <span class="seg">A</span>
  </div>

  <h1 class="title">
    Проект <span class="it">после</span> <span class="amp">&amp;</span> онбординга<span class="period">.</span>
  </h1>

  <section class="goals" aria-label="Шесть целей">
    <div class="goal">
      <div class="idx">01</div>
      <div class="body">Знает <span class="hit">структуру</span>.</div>
    </div>
    <div class="goal">
      <div class="idx">02</div>
      <div class="body">Следует <span class="hit">конвенциям</span>.</div>
    </div>
    <div class="goal">
      <div class="idx">03</div>
      <div class="body">Находит <span class="hit">тесты и&nbsp;моки</span>.</div>
    </div>
    <div class="goal">
      <div class="idx">04</div>
      <div class="body">Задаёт <span class="hit">вопросы</span>.</div>
    </div>
    <div class="goal">
      <div class="idx">05</div>
      <div class="body">Не&nbsp;ломает <span class="hit">legacy</span>.</div>
    </div>
    <div class="goal">
      <div class="idx">06</div>
      <div class="body">Держит <span class="hit">контекст</span>.</div>
    </div>
  </section>
</div>
</body>
</html>
