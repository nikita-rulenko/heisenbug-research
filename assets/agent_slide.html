<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>«ИИ агент тупит» · диагноз</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700;800;900&family=Prata&family=PT+Mono&display=swap"
  rel="stylesheet">
<style>
  /* ────────── tokens ─────────────────────────────── */
  :root {
    --paper:     #F1EEE6;
    --paper-2:   #E3DFD4;
    --ink:       #0E0F14;
    --ink-soft:  #3F424A;
    --ink-mute:  #82858D;
    --accent:    #D94425;             /* vermilion — signage red-orange */
    --accent-2:  #8A1B0A;
    --rule:      rgba(14,15,20,0.20);
    --rule-bold: #0E0F14;

    --slide-w: 1920px;
    --slide-h: 1080px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { background: var(--paper); }
  body { color: var(--ink); font-family: "Onest", system-ui, sans-serif; }

  body.preview { background: #111216; display: grid; place-items: center; padding: 40px; min-height: 100vh; }
  body.preview .slide { box-shadow: 0 40px 120px rgba(0,0,0,0.5); }

  .slide {
    position: relative;
    width: var(--slide-w); height: var(--slide-h);
    background: var(--paper);
    overflow: hidden;
  }

  /* subtle paper grain */
  .slide::before {
    content: "";
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.1' numOctaves='1' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.05  0 0 0 0 0.05  0 0 0 0 0.07  0 0 0 0.06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    mix-blend-mode: multiply;
    opacity: 0.5;
    pointer-events: none;
    z-index: 20;
  }

  /* ────────── top bar ───────────────────────────── */
  .top {
    position: absolute;
    top: 48px;
    left: 88px; right: 88px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: "PT Mono", monospace;
    font-size: 18px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-soft);
    z-index: 3;
  }
  .top .lhs { display: inline-flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .top .mark {
    display: inline-block;
    width: 14px; height: 14px;
    background: var(--accent);
  }
  .top .rule { flex: 1; height: 1.5px; background: var(--rule); margin: 0 24px; }
  .top .rhs { font-weight: 700; color: var(--ink); letter-spacing: 0.3em; flex-shrink: 0; }

  /* ────────── quote (complaint) ─────────────────── */
  .quote-block {
    position: absolute;
    top: 138px;
    left: 88px; right: 88px;
    z-index: 3;
  }
  .quote-label {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 8px 14px 8px 0;
    font-family: "PT Mono", monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 12px;
  }
  .quote-label .dot {
    width: 10px; height: 10px;
    background: var(--ink);
    border-radius: 50%;
    display: inline-block;
  }

  .quote {
    font-family: "Prata", serif;
    font-size: 96px;
    line-height: 1.02;
    letter-spacing: -0.015em;
    color: var(--ink-soft);
  }
  .quote .openq, .quote .closeq {
    color: var(--accent);
    display: inline-block;
  }
  .quote .openq { margin-right: 6px; transform: translateY(0.08em); }
  .quote .closeq { margin-left: 4px; transform: translateY(0.08em); }

  /* ────────── divider / arrow ───────────────────── */
  .divider {
    position: absolute;
    left: 88px; right: 88px;
    top: 392px;
    height: 2px;
    background: var(--rule-bold);
    z-index: 3;
  }
  .divider .arrow {
    position: absolute;
    top: -27px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--paper);
    padding: 0 20px;
    font-family: "Onest", sans-serif;
    font-weight: 900;
    font-size: 42px;
    line-height: 1;
    color: var(--accent);
    letter-spacing: 0;
    display: inline-flex;
    align-items: center;
    gap: 14px;
  }
  .divider .arrow .chip {
    font-family: "PT Mono", monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink);
  }

  /* ────────── diagnosis ─────────────────────────── */
  .diagnosis-block {
    position: absolute;
    top: 470px;
    left: 88px; right: 88px;
    z-index: 3;
  }
  .diagnosis-label {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 10px 18px;
    background: var(--accent);
    color: var(--paper);
    font-family: "PT Mono", monospace;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.36em;
    text-transform: uppercase;
    margin-bottom: 28px;
    transform: rotate(-1deg);
  }

  .diagnosis {
    font-family: "Onest", sans-serif;
    font-weight: 900;
    font-size: 224px;
    line-height: 0.88;
    letter-spacing: -0.045em;
    color: var(--ink);
    text-transform: uppercase;
  }
  .diagnosis .hit { color: var(--accent); }
  .diagnosis .punct {
    color: var(--accent);
    display: inline-block;
  }
  .diagnosis .underline {
    position: relative;
    display: inline-block;
  }
  .diagnosis .underline::after {
    content: "";
    position: absolute;
    left: -4px; right: -4px;
    bottom: 22px;
    height: 10px;
    background: var(--accent);
    z-index: -1;
    opacity: 0.85;
  }

  /* rubber stamp — CONTEXT MISSING */
  .stamp {
    position: absolute;
    right: 96px;
    top: 470px;
    width: 240px; height: 240px;
    transform: rotate(-9deg);
    z-index: 4;
    pointer-events: none;
    opacity: 0.92;
  }
  .stamp-circle {
    width: 100%; height: 100%;
    border: 5px solid var(--accent);
    border-radius: 50%;
    display: grid; place-items: center;
    color: var(--accent);
    text-align: center;
    padding: 14px;
    position: relative;
  }
  .stamp-circle::before {
    content: "";
    position: absolute; inset: 10px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    opacity: 0.65;
  }
  .stamp-circle::after {
    content: "";
    position: absolute; inset: 0;
    border-radius: 50%;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='sn'><feTurbulence type='fractalNoise' baseFrequency='1.6' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.93  0 0 0 0 0.90  0 0 0 0.55 0'/></filter><rect width='100%25' height='100%25' filter='url(%23sn)'/></svg>");
    mix-blend-mode: screen;
    opacity: 0.7;
  }
  .stamp-circle .top-text, .stamp-circle .bot-text {
    font-family: "PT Mono", monospace;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.34em;
    text-transform: uppercase;
  }
  .stamp-circle .big {
    font-family: "Onest", sans-serif;
    font-weight: 900;
    font-size: 36px;
    line-height: 0.92;
    letter-spacing: -0.02em;
    margin: 8px 0;
    text-transform: uppercase;
  }
  .stamp-circle .inner-dot {
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
  }

  /* ────────── footer ────────────────────────────── */
  .footer {
    position: absolute;
    bottom: 46px;
    left: 88px; right: 88px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: "PT Mono", monospace;
    font-size: 16px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-soft);
    z-index: 3;
  }
  .footer .mid {
    color: var(--ink);
    font-weight: 700;
    letter-spacing: 0.3em;
  }
  .footer .mid .acc { color: var(--accent); }
</style>
</head>
<body>
<script>
  if (location.hash === "#preview") document.body.classList.add("preview");
</script>

<div class="slide" aria-label="Слайд: диагноз — ты не провёл онбординг">

  <div class="top">
    <div class="lhs">
      <span class="mark" aria-hidden="true"></span>
      <span>Жалоба / Диагноз</span>
    </div>
    <div class="rule" aria-hidden="true"></div>
    <div class="rhs">Heisenbug&nbsp;2026</div>
  </div>

  <!-- ЖАЛОБА -->
  <div class="quote-block">
    <div class="quote-label">
      <span class="dot" aria-hidden="true"></span>
      <span>Жалоба · Complaint</span>
    </div>
    <div class="quote">
      <span class="openq">«</span>ИИ&nbsp;агент тупит<br>
      и&nbsp;делает не&nbsp;то!<span class="closeq">»</span>
    </div>
  </div>

  <!-- divider -->
  <div class="divider" aria-hidden="true">
    <span class="arrow">
      <span class="chip">поэтому</span>
      ↓
    </span>
  </div>

  <!-- ДИАГНОЗ -->
  <div class="diagnosis-block">
    <div class="diagnosis-label">
      <span>◆</span>
      <span>Диагноз · Diagnosis</span>
    </div>
    <div class="diagnosis">
      Ты не провёл<br>
      <span class="hit">онбординг<span class="punct">!</span></span>
    </div>
  </div>

  <!-- stamp -->
  <div class="stamp" aria-hidden="true">
    <div class="stamp-circle">
      <div style="display:flex; flex-direction:column; align-items:center;">
        <div class="top-text">Helixir&nbsp;·&nbsp;2026</div>
        <div class="inner-dot"></div>
        <div class="big">Context<br>Missing</div>
        <div class="inner-dot"></div>
        <div class="bot-text">Context&nbsp;recovery</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div>Helixir · Context Recovery</div>
    <div class="mid">Агент не&nbsp;тупит&nbsp;&nbsp;<span class="acc">—</span>&nbsp;&nbsp;ему не&nbsp;дали контекст</div>
    <div>Heisenbug&nbsp;·&nbsp;2026</div>
  </div>

</div>
</body>
</html>
