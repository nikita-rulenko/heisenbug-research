<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Для кого доклад? · Heisenbug 2026</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./_base.css">
<style>
  .hero h1 {
    font-size: 196px;
    line-height: 0.92;
    letter-spacing: -0.05em;
  }
  .hero h1 .for { color: var(--aluminium); font-weight: 400; }
  .hero h1 .who { color: var(--paper); font-weight: 800; display: inline-block; }
  .hero h1 .q   { color: var(--rambler); font-weight: 800; }
</style>
</head>
<body>
<script>if (location.hash === "#preview") document.body.classList.add("preview");</script>

<div class="slide" aria-label="Для кого этот доклад">
  <div class="mark-bg left" aria-hidden="true">/</div>

  <div class="top">
    <div class="lhs">
      <span class="dot" aria-hidden="true"></span>
      <span>Index <span class="slash">/</span> Audience</span>
    </div>
    <div class="rhs">Heisenbug · 2026</div>
  </div>
  <div class="rule-top" aria-hidden="true"></div>

  <div class="hero">
    <div class="eyebrow">
      <span class="bar" aria-hidden="true"></span>
      <span>Вопрос <span class="hi">· в зал</span></span>
    </div>

    <h1>
      <span class="for">Для</span> <span class="who">кого</span><br>
      <span class="for">этот</span> <span class="who">доклад</span><span class="q">?</span>
    </h1>
  </div>

  <div class="rule-bot" aria-hidden="true"></div>
  <div class="footer">
    <div class="l"><span class="mark">/</span><span>Rambler</span></div>
    <div class="r"><span>Heisenbug</span><span class="mark">/</span></div>
  </div>
</div>
</body>
</html>
