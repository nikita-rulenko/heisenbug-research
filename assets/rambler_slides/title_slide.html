<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Управление контекстом · Heisenbug 2026</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./_base.css">
<style>
  .hero { top: 50%; transform: translateY(-52%); }
  .hero h1 {
    font-size: 196px;
    line-height: 0.88;
    letter-spacing: -0.055em;
  }
  .hero h1 .line-hi {
    display: block;
    color: var(--paper);
    font-weight: 800;
  }
  .hero h1 .line-hi .slash { color: var(--rambler); font-weight: 500; }
  .hero h1 .line-sub {
    display: block;
    margin-top: 32px;
    color: var(--aluminium);
    font-weight: 400;
    font-size: 54px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    max-width: 1600px;
  }
  .hero h1 .line-sub .ai { color: var(--paper); font-weight: 600; }
  .hero h1 .line-sub .slash { color: var(--rambler); font-weight: 500; padding: 0 0.15em; }
</style>
</head>
<body>
<script>if (location.hash === "#preview") document.body.classList.add("preview");</script>

<div class="slide" aria-label="Управление контекстом в автотестах с ИИ">
  <div class="mark-bg center" aria-hidden="true">/</div>

  <div class="top">
    <div class="lhs">
      <span class="dot" aria-hidden="true"></span>
      <span>Nikita&nbsp;Rulenko <span class="slash">/</span> Helixir</span>
    </div>
    <div class="rhs">Heisenbug · 2026</div>
  </div>
  <div class="rule-top" aria-hidden="true"></div>

  <div class="hero">
    <div class="eyebrow">
      <span class="bar" aria-hidden="true"></span>
      <span>Keynote <span class="hi">· Опыт</span></span>
    </div>

    <h1>
      <span class="line-hi">УПРАВЛЕНИЕ<br>КОНТЕКСТОМ</span>
      <span class="line-sub">
        при растущей кодовой базе автотестов <span class="slash">/</span> с&nbsp;помощью <span class="ai">ИИ</span>
      </span>
    </h1>
  </div>

  <div class="rule-bot" aria-hidden="true"></div>
  <div class="footer">
    <div class="l"><span class="mark">/</span><span>Rambler</span></div>
    <div class="r"><span>Heisenbug</span><span class="mark">/</span></div>
  </div>
</div>
</body>
</html>
