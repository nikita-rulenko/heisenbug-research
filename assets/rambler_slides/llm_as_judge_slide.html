<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>LLM-as-a-Judge · Heisenbug 2026</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./_base.css">
<style>
  .hero { top: 50%; transform: translateY(-54%); }

  .hero h1 {
    font-family: "Unbounded", sans-serif;
    font-weight: 800;
    font-size: 176px;
    line-height: 0.95;
    letter-spacing: -0.05em;
    color: var(--paper);
    position: relative;
    display: block;
    width: max-content;
    max-width: 100%;
  }
  .hero h1 .dash { color: var(--rambler); font-weight: 500; padding: 0 0.04em; }
  .hero h1 .pivot { color: var(--rambler); font-weight: 800; }
  .hero h1::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -18px;
    height: 6px;
    background: var(--rambler);
    box-shadow: 0 0 26px rgba(30,111,255,0.55);
  }

  .sub {
    margin-top: 54px;
    font-family: "Manrope", sans-serif;
    font-weight: 500;
    font-size: 56px;
    letter-spacing: -0.005em;
    line-height: 1.1;
    color: var(--aluminium);
  }
  .sub b { color: var(--paper); font-weight: 700; }
  .sub .arrow {
    display: inline-block;
    color: var(--rambler);
    font-family: "Unbounded", sans-serif;
    font-weight: 700;
    margin: 0 0.3em;
    transform: translateY(-0.05em);
  }

  /* two nodes connected */
  .nodes {
    position: absolute;
    right: 120px;
    top: 210px;
    z-index: 5;
    display: flex;
    align-items: center;
    gap: 22px;
    font-family: "JetBrains Mono", monospace;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
  }
  .node {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 12px 18px;
    border: 1px solid var(--rambler-mid);
    color: var(--paper);
  }
  .node .pin { width: 8px; height: 8px; background: var(--rambler); border-radius: 50%; box-shadow: 0 0 10px var(--rambler); }
  .node.judge { background: var(--rambler); color: var(--black); border-color: var(--rambler); }
  .node.judge .pin { background: var(--black); box-shadow: none; }
  .nodes .arrow { color: var(--rambler); font-family: "Unbounded", sans-serif; font-weight: 700; font-size: 22px; }
</style>
</head>
<body>
<script>if (location.hash === "#preview") document.body.classList.add("preview");</script>

<div class="slide" aria-label="LLM-as-a-Judge — одна модель оценивает другую">
  <div class="mark-bg right" aria-hidden="true">/</div>

  <div class="top">
    <div class="lhs">
      <span class="dot" aria-hidden="true"></span>
      <span>Method <span class="slash">/</span> Judge</span>
    </div>
    <div class="rhs">Heisenbug · 2026</div>
  </div>
  <div class="rule-top" aria-hidden="true"></div>

  <div class="nodes" aria-hidden="true">
    <span class="node"><span class="pin"></span>Model&nbsp;A</span>
    <span class="arrow">→</span>
    <span class="node judge"><span class="pin"></span>Judge</span>
  </div>

  <div class="hero">
    <div class="eyebrow">
      <span class="bar" aria-hidden="true"></span>
      <span>Метод <span class="hi">· как измеряем</span></span>
    </div>

    <h1>LLM<span class="dash">-</span>as<span class="dash">-</span>a<span class="dash">-</span><span class="pivot">Judge</span></h1>

    <div class="sub">
      одна <b>модель</b> <span class="arrow">→</span> <b>оценивает</b> другую
    </div>
  </div>

  <div class="rule-bot" aria-hidden="true"></div>
  <div class="footer">
    <div class="l"><span class="mark">/</span><span>Rambler</span></div>
    <div class="r"><span>Heisenbug</span><span class="mark">/</span></div>
  </div>
</div>
</body>
</html>
