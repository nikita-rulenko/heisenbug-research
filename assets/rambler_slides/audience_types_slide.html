<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Четыре типа слушателей · Heisenbug 2026</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./_base.css">
<style>
  .hero { top: 48%; transform: translateY(-50%); }
  .hero h1 {
    font-size: 150px;
    line-height: 0.92;
    letter-spacing: -0.04em;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 40px 120px;
  }
  .hero h1 .row {
    display: flex; align-items: baseline; gap: 30px;
  }
  .hero h1 .num {
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: 28px;
    letter-spacing: 0.24em;
    color: var(--rambler);
    width: 70px;
    flex-shrink: 0;
    transform: translateY(-0.5em);
  }
  .hero h1 .w { color: var(--paper); font-weight: 700; }
</style>
</head>
<body>
<script>if (location.hash === "#preview") document.body.classList.add("preview");</script>

<div class="slide" aria-label="Четыре типа слушателей">
  <div class="mark-bg right" aria-hidden="true">/</div>

  <div class="top">
    <div class="lhs">
      <span class="dot" aria-hidden="true"></span>
      <span>Audience <span class="slash">/</span> Matrix</span>
    </div>
    <div class="rhs">Heisenbug · 2026</div>
  </div>
  <div class="rule-top" aria-hidden="true"></div>

  <div class="hero">
    <div class="eyebrow">
      <span class="bar" aria-hidden="true"></span>
      <span>Четыре типа <span class="hi">· в зале</span></span>
    </div>

    <h1>
      <span class="row"><span class="num">01</span><span class="w">QA</span></span>
      <span class="row"><span class="num">02</span><span class="w">Dev</span></span>
      <span class="row"><span class="num">03</span><span class="w">Load</span></span>
      <span class="row"><span class="num">04</span><span class="w">Manager</span></span>
    </h1>
  </div>

  <div class="rule-bot" aria-hidden="true"></div>
  <div class="footer">
    <div class="l"><span class="mark">/</span><span>Rambler</span></div>
    <div class="r"><span>Heisenbug</span><span class="mark">/</span></div>
  </div>
</div>
</body>
</html>
