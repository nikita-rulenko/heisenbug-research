<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Ты не провёл онбординг! (2/2) · Heisenbug 2026</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./_base.css">
<style>
  .hero { top: 50%; transform: translateY(-52%); }

  .block {
    font-family: "Unbounded", sans-serif;
    font-weight: 700;
    line-height: 0.92;
    letter-spacing: -0.04em;
  }
  .block .quote { font-weight: 400; }

  /* complaint block (top) — DIMMED on this slide */
  .block.complaint {
    font-size: 112px;
    color: var(--alu-dim);
    font-weight: 600;
    opacity: 0.55;
    margin-bottom: 52px;
  }
  .block.complaint .muted { color: var(--alu-dim); }

  /* diagnosis block (bottom) — ACTIVE on this slide */
  .block.diagnosis {
    font-size: 144px;
    color: var(--paper);
    position: relative;
    display: inline-block;
  }
  .block.diagnosis .hi { color: var(--rambler); font-weight: 800; }
  .block.diagnosis::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -14px;
    height: 6px;
    background: var(--rambler);
    box-shadow: 0 0 22px rgba(30,111,255,0.55);
  }

  /* small connector arrow between blocks */
  .connector {
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: 18px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--aluminium);
    margin: 8px 0 28px;
    display: flex; align-items: center; gap: 14px;
  }
  .connector .arrow { color: var(--rambler); font-family: "Unbounded", sans-serif; font-weight: 700; font-size: 22px; }

  .step {
    position: absolute;
    right: 96px;
    top: 200px;
    z-index: 5;
    font-family: "JetBrains Mono", monospace;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--aluminium);
    text-align: right;
  }
  .step .past { color: var(--alu-dim); margin-right: 8px; }
  .step .now {
    display: inline-block;
    padding: 6px 14px;
    background: var(--rambler);
    color: var(--black);
    font-weight: 800;
  }
</style>
</head>
<body>
<script>if (location.hash === "#preview") document.body.classList.add("preview");</script>

<div class="slide" aria-label="Диагноз — ты не провёл онбординг (2/2)">
  <div class="mark-bg right" aria-hidden="true">/</div>

  <div class="top">
    <div class="lhs">
      <span class="dot" aria-hidden="true"></span>
      <span>Dialog <span class="slash">/</span> Step 2 of 2</span>
    </div>
    <div class="rhs">Heisenbug · 2026</div>
  </div>
  <div class="rule-top" aria-hidden="true"></div>

  <div class="step" aria-hidden="true">
    <span class="past">01</span><span class="now">02</span>
    <div style="margin-top:6px;">диагноз<span style="color:var(--rambler);">&nbsp;·&nbsp;сейчас</span></div>
  </div>

  <div class="hero">
    <div class="eyebrow">
      <span class="bar" aria-hidden="true"></span>
      <span>Диалог <span class="hi">· 2 из 2</span></span>
    </div>

    <div class="block complaint">
      <span class="quote muted">«</span><span class="muted">Мой&nbsp;агент&nbsp;делает&nbsp;не&nbsp;то</span>!<span class="quote muted">»</span>
    </div>

    <div class="connector"><span class="arrow">↓</span><span>ответ</span></div>

    <div class="block diagnosis">
      <span class="quote">«</span>Ты <span class="hi">не&nbsp;провёл</span><br><span class="hi">онбординг</span>!<span class="quote">»</span>
    </div>
  </div>

  <div class="rule-bot" aria-hidden="true"></div>
  <div class="footer">
    <div class="l"><span class="mark">/</span><span>Rambler</span></div>
    <div class="r"><span>Heisenbug</span><span class="mark">/</span></div>
  </div>
</div>
</body>
</html>
