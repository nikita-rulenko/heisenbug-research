<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Цена онбординга · данные · Heisenbug 2026</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./_base.css">
<style>
  .hero { top: 50%; transform: translateY(-52%); }
  .hero .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 28px;
  }
  .cell {
    padding: 44px 36px 40px;
    border: 1px solid var(--hairline);
    background: rgba(30,111,255,0.03);
    position: relative;
  }
  .cell .region {
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: 16px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--rambler);
    margin-bottom: 32px;
  }
  .cell .num {
    font-family: "Unbounded", sans-serif;
    font-weight: 700;
    font-size: 76px;
    line-height: 0.95;
    letter-spacing: -0.04em;
    color: var(--paper);
  }
  .cell .unit {
    margin-top: 14px;
    font-family: "Manrope", sans-serif;
    font-weight: 500;
    font-size: 22px;
    color: var(--aluminium);
  }
  .cell.hi {
    background: rgba(30,111,255,0.09);
    border-color: var(--rambler-mid);
  }
  .cell.hi .num { color: var(--rambler); }
</style>
</head>
<body>
<script>if (location.hash === "#preview") document.body.classList.add("preview");</script>

<div class="slide" aria-label="Цена онбординга по регионам">
  <div class="mark-bg right" aria-hidden="true">/</div>

  <div class="top">
    <div class="lhs">
      <span class="dot" aria-hidden="true"></span>
      <span>Cost <span class="slash">/</span> Data</span>
    </div>
    <div class="rhs">Heisenbug · 2026</div>
  </div>
  <div class="rule-top" aria-hidden="true"></div>

  <div class="hero">
    <div class="eyebrow">
      <span class="bar" aria-hidden="true"></span>
      <span>В месяц <span class="hi">· по регионам</span></span>
    </div>

    <div class="grid">
      <div class="cell">
        <div class="region">Европа</div>
        <div class="num">€7–10k</div>
        <div class="unit">на разработчика</div>
      </div>
      <div class="cell hi">
        <div class="region">США</div>
        <div class="num">$20k</div>
        <div class="unit">на разработчика</div>
      </div>
      <div class="cell">
        <div class="region">Россия</div>
        <div class="num">100–250k&nbsp;₽</div>
        <div class="unit">на разработчика</div>
      </div>
      <div class="cell">
        <div class="region">Азия</div>
        <div class="num">$3–5k</div>
        <div class="unit">на разработчика</div>
      </div>
    </div>
  </div>

  <div class="rule-bot" aria-hidden="true"></div>
  <div class="footer">
    <div class="l"><span class="mark">/</span><span>Rambler</span></div>
    <div class="r"><span>Heisenbug</span><span class="mark">/</span></div>
  </div>
</div>
</body>
</html>
