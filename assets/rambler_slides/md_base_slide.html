<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>MD — это БАЗА · Heisenbug 2026</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./_base.css">
<style>
  .hero h1 {
    font-size: 280px;
    display: flex;
    align-items: baseline;
    gap: 38px;
    flex-wrap: wrap;
  }
  .hero h1 .md   { color: var(--paper); font-weight: 800; }
  .hero h1 .dash { color: var(--aluminium); font-weight: 400; }
  .hero h1 .it   { color: var(--aluminium); font-weight: 500; font-size: 0.52em; letter-spacing: -0.02em; }
  .hero h1 .base {
    color: var(--rambler);
    font-weight: 800;
    position: relative;
    display: inline-block;
  }
  .hero h1 .base::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    bottom: -0.08em;
    height: 10px;
    background: var(--rambler);
    box-shadow: 0 0 24px rgba(30,111,255,0.55);
  }
</style>
</head>
<body>
<script>if (location.hash === "#preview") document.body.classList.add("preview");</script>

<div class="slide" aria-label="MD — это БАЗА">
  <div class="mark-bg right" aria-hidden="true">/</div>

  <div class="top">
    <div class="lhs">
      <span class="dot" aria-hidden="true"></span>
      <span>Context Recovery <span class="slash">/</span> 01</span>
    </div>
    <div class="rhs">Heisenbug · 2026</div>
  </div>
  <div class="rule-top" aria-hidden="true"></div>

  <div class="rail" aria-hidden="true">
    <span class="k">// note</span>
    <span class="v">base&nbsp;·&nbsp;root</span>
  </div>

  <div class="hero">
    <div class="eyebrow">
      <span class="bar" aria-hidden="true"></span>
      <span>Основа <span class="hi">· агент читает первым</span></span>
    </div>

    <h1>
      <span class="md">MD</span>
      <span class="dash">—</span>
      <span class="it">это</span>
      <span class="base">БАЗА</span>
    </h1>
  </div>

  <div class="rule-bot" aria-hidden="true"></div>
  <div class="footer">
    <div class="l"><span class="mark">/</span><span>Rambler</span></div>
    <div class="r"><span>Heisenbug</span><span class="mark">/</span></div>
  </div>
</div>
</body>
</html>
