<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Mem0 · семантический поиск · Heisenbug 2026</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./_base.css">
<style>
  .hero { top: 50%; transform: translateY(-54%); }

  .hero h1 {
    font-family: "Unbounded", sans-serif;
    font-weight: 800;
    font-size: 232px;
    line-height: 0.92;
    letter-spacing: -0.05em;
    color: var(--paper);
    position: relative;
    display: block;
    width: max-content;
    max-width: 100%;
  }
  .hero h1 .zero { color: var(--rambler); font-weight: 900; }
  .hero h1::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -16px;
    height: 6px;
    background: var(--rambler);
    box-shadow: 0 0 24px rgba(30,111,255,0.55);
  }

  .sub {
    margin-top: 56px;
    font-family: "Manrope", sans-serif;
    font-weight: 500;
    font-size: 56px;
    letter-spacing: -0.005em;
    line-height: 1.15;
    color: var(--aluminium);
    max-width: 1500px;
  }
  .sub b { color: var(--paper); font-weight: 700; }
  .sub .hi { color: var(--rambler); font-weight: 800; }
  .sub .vs {
    display: inline-block;
    color: var(--rambler);
    font-family: "Unbounded", sans-serif;
    font-weight: 700;
    margin: 0 0.3em;
    transform: translateY(-0.05em);
  }

  /* contrast mini-row: semantic vs tickets */
  .vs-row {
    position: absolute;
    right: 120px;
    top: 200px;
    z-index: 5;
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: "JetBrains Mono", monospace;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
  }
  .chip-old {
    padding: 10px 16px;
    border: 1px solid rgba(168,174,187,0.3);
    color: var(--alu-dim);
    text-decoration: line-through;
    text-decoration-color: var(--bad, #EF4444);
  }
  .chip-new {
    padding: 10px 16px;
    background: var(--rambler);
    color: var(--black);
    font-weight: 800;
  }
  .vs-row .arr { color: var(--rambler); font-family: "Unbounded", sans-serif; font-size: 22px; }
</style>
</head>
<body>
<script>if (location.hash === "#preview") document.body.classList.add("preview");</script>

<div class="slide" aria-label="Mem0 — семантический поиск вместо кучи тикетов">
  <div class="mark-bg right" aria-hidden="true">/</div>

  <div class="top">
    <div class="lhs">
      <span class="dot" aria-hidden="true"></span>
      <span>Approach <span class="slash">/</span> Mem0</span>
    </div>
    <div class="rhs">Heisenbug · 2026</div>
  </div>
  <div class="rule-top" aria-hidden="true"></div>

  <div class="vs-row" aria-hidden="true">
    <span class="chip-old">tickets</span>
    <span class="arr">→</span>
    <span class="chip-new">vector&nbsp;search</span>
  </div>

  <div class="hero">
    <div class="eyebrow">
      <span class="bar" aria-hidden="true"></span>
      <span>Подход <span class="hi">· семантика</span></span>
    </div>

    <h1>Mem<span class="zero">0</span></h1>

    <div class="sub">
      <span class="hi">семантический</span> <b>поиск</b><span class="vs">→</span>вместо <b>кучи тикетов</b>
    </div>
  </div>

  <div class="rule-bot" aria-hidden="true"></div>
  <div class="footer">
    <div class="l"><span class="mark">/</span><span>Rambler</span></div>
    <div class="r"><span>Heisenbug</span><span class="mark">/</span></div>
  </div>
</div>
</body>
</html>
