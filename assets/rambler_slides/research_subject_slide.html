<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Демо — сотни тестов, тысячи строк · Heisenbug 2026</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./_base.css">
<style>
  .hero { top: 50%; transform: translateY(-52%); }

  /* small brand tag — Bean & Brew is context, not the point */
  .brand-tag {
    display: inline-flex; align-items: center; gap: 14px;
    padding: 8px 16px;
    margin-bottom: 40px;
    border: 1px solid var(--rambler-mid);
    font-family: "JetBrains Mono", monospace;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--aluminium);
  }
  .brand-tag .dot {
    width: 8px; height: 8px;
    background: var(--rambler);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--rambler);
  }
  .brand-tag b { color: var(--paper); font-weight: 800; letter-spacing: 0.14em; }
  .brand-tag .amp { color: var(--rambler); font-weight: 700; }

  /* two big scale blocks */
  .scale {
    display: flex;
    align-items: flex-start;
    gap: 90px;
  }
  .scale .col { display: flex; flex-direction: column; }
  .scale .num {
    font-family: "Unbounded", sans-serif;
    font-weight: 800;
    font-size: 176px;
    line-height: 0.9;
    letter-spacing: -0.05em;
    color: var(--rambler);
    position: relative;
    display: inline-block;
  }
  .scale .num::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -10px;
    height: 6px;
    background: var(--rambler);
    box-shadow: 0 0 24px rgba(30,111,255,0.55);
  }
  .scale .lbl {
    margin-top: 24px;
    font-family: "Unbounded", sans-serif;
    font-weight: 500;
    font-size: 52px;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--paper);
  }

  /* separator column: vertical rule + slash mark */
  .scale .sep {
    width: 2px;
    align-self: stretch;
    background: linear-gradient(to bottom, transparent, var(--rambler-mid), transparent);
    position: relative;
  }
  .scale .sep::before {
    content: "/";
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-family: "Unbounded", sans-serif;
    font-weight: 900;
    font-size: 72px;
    color: var(--rambler);
    background: var(--black);
    padding: 6px 12px;
    line-height: 1;
  }

  /* footline — stack hint, quiet */
  .stack {
    margin-top: 80px;
    display: inline-flex; gap: 22px; align-items: center;
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: 16px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--alu-dim);
  }
  .stack .sep { color: var(--rambler); font-weight: 700; }
  .stack b { color: var(--paper); font-weight: 700; }
</style>
</head>
<body>
<script>if (location.hash === "#preview") document.body.classList.add("preview");</script>

<div class="slide" aria-label="Демо-проект — сотни тестов, тысячи строк кода">
  <div class="mark-bg right" aria-hidden="true">/</div>

  <div class="top">
    <div class="lhs">
      <span class="dot" aria-hidden="true"></span>
      <span>Demo <span class="slash">/</span> Subject</span>
    </div>
    <div class="rhs">Heisenbug · 2026</div>
  </div>
  <div class="rule-top" aria-hidden="true"></div>

  <div class="hero">
    <div class="eyebrow">
      <span class="bar" aria-hidden="true"></span>
      <span>Демо-проект <span class="hi">· масштаб</span></span>
    </div>

    <span class="brand-tag">
      <span class="dot" aria-hidden="true"></span>
      <b>Bean</b><span class="amp">&amp;</span><b>Brew</b>
    </span>

    <div class="scale">
      <div class="col">
        <span class="num">сотни</span>
        <span class="lbl">тестов</span>
      </div>
      <div class="sep" aria-hidden="true"></div>
      <div class="col">
        <span class="num">тысячи</span>
        <span class="lbl">строк&nbsp;кода</span>
      </div>
    </div>

    <div class="stack" aria-hidden="true">
      <span>Stack</span><span class="sep">/</span>
      <b>Front</b><span class="sep">·</span><b>Back</b><span class="sep">·</span><b>DB</b>
    </div>
  </div>

  <div class="rule-bot" aria-hidden="true"></div>
  <div class="footer">
    <div class="l"><span class="mark">/</span><span>Rambler</span></div>
    <div class="r"><span>Heisenbug</span><span class="mark">/</span></div>
  </div>
</div>
</body>
</html>
