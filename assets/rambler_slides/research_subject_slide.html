<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Bean & Brew · Heisenbug 2026</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./_base.css">
<style>
  .hero h1 {
    font-size: 240px;
    line-height: 0.88;
    letter-spacing: -0.05em;
  }
  .hero h1 .w  { color: var(--paper); font-weight: 700; }
  .hero h1 .muted { color: var(--aluminium); font-weight: 500; }
  .hero h1 .amp { color: var(--rambler); font-weight: 500; font-style: italic; padding: 0 0.08em; }
  .stats {
    margin-top: 68px;
    display: flex; gap: 56px;
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--aluminium);
  }
  .stats .stat { display: flex; flex-direction: column; gap: 6px; }
  .stats .v {
    font-family: "Unbounded", sans-serif;
    font-weight: 700;
    font-size: 44px;
    letter-spacing: -0.03em;
    color: var(--paper);
  }
  .stats .stat.hi .v { color: var(--rambler); }
</style>
</head>
<body>
<script>if (location.hash === "#preview") document.body.classList.add("preview");</script>

<div class="slide" aria-label="Bean & Brew — демо-проект">
  <div class="mark-bg right" aria-hidden="true">/</div>

  <div class="top">
    <div class="lhs">
      <span class="dot" aria-hidden="true"></span>
      <span>Demo <span class="slash">/</span> Subject</span>
    </div>
    <div class="rhs">Heisenbug · 2026</div>
  </div>
  <div class="rule-top" aria-hidden="true"></div>

  <div class="hero">
    <div class="eyebrow">
      <span class="bar" aria-hidden="true"></span>
      <span>Демо-проект <span class="hi">· на чём смотрим</span></span>
    </div>

    <h1>
      <span class="w">Bean</span><span class="amp">&amp;</span><span class="w">Brew</span>
    </h1>

    <div class="stats" aria-hidden="true">
      <div class="stat hi"><span>Tests</span><span class="v">100+</span></div>
      <div class="stat"><span>LOC</span><span class="v">≈10k</span></div>
      <div class="stat"><span>Stack</span><span class="v">Front · Back · DB</span></div>
    </div>
  </div>

  <div class="rule-bot" aria-hidden="true"></div>
  <div class="footer">
    <div class="l"><span class="mark">/</span><span>Rambler</span></div>
    <div class="r"><span>Heisenbug</span><span class="mark">/</span></div>
  </div>
</div>
</body>
</html>
