<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Никита Руленко · Heisenbug 2026</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./_base.css">
<style>
  /* 2-col layout: photo + identity */
  .layout {
    position: absolute;
    left: 96px; right: 96px;
    top: 150px; bottom: 130px;
    display: grid;
    grid-template-columns: 560px 1fr;
    gap: 90px;
    align-items: center;
    z-index: 5;
  }

  /* photo card (square with crosshair corners) */
  .photo-card {
    position: relative;
    width: 520px; height: 520px;
    justify-self: center;
  }
  .photo-card img {
    display: block;
    width: 100%; height: 100%;
    object-fit: cover;
    box-shadow: 0 30px 80px rgba(0,0,0,0.75), 0 10px 24px rgba(0,0,0,0.5);
  }
  .photo-card .corner {
    position: absolute;
    width: 38px; height: 38px;
    pointer-events: none;
  }
  .photo-card .corner::before,
  .photo-card .corner::after {
    content: ""; position: absolute;
    background: var(--rambler);
    box-shadow: 0 0 10px var(--rambler);
  }
  .photo-card .corner::before { left: 0; top: 0; width: 100%; height: 2px; }
  .photo-card .corner::after  { left: 0; top: 0; width: 2px; height: 100%; }
  .photo-card .corner.tl { left: -18px; top: -18px; }
  .photo-card .corner.tr { right: -18px; top: -18px; transform: scaleX(-1); }
  .photo-card .corner.bl { left: -18px; bottom: -18px; transform: scaleY(-1); }
  .photo-card .corner.br { right: -18px; bottom: -18px; transform: scale(-1,-1); }

  /* tiny meta label above photo */
  .photo-tag {
    position: absolute;
    left: -4px; top: -52px;
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--rambler);
  }
  .photo-tag .muted { color: var(--aluminium); }

  /* right column — identity */
  .identity { display: flex; flex-direction: column; justify-content: center; gap: 0; }

  .kicker {
    display: inline-flex; align-items: center; gap: 18px;
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: 15px;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--aluminium);
    margin-bottom: 24px;
  }
  .kicker .bar { width: 56px; height: 2px; background: var(--rambler); }
  .kicker .q { color: var(--rambler); font-weight: 700; }

  .name {
    font-family: "Unbounded", sans-serif;
    font-weight: 800;
    font-size: 176px;
    line-height: 0.88;
    letter-spacing: -0.05em;
    color: var(--paper);
    margin-bottom: 36px;
  }
  .name .ln2 { color: var(--rambler); display: block; }

  .meta-row {
    display: flex; align-items: center; gap: 24px;
    flex-wrap: wrap;
  }
  .role {
    font-family: "Manrope", sans-serif;
    font-weight: 500;
    font-size: 26px;
    letter-spacing: 0.01em;
    color: var(--aluminium);
  }
  .role b { color: var(--paper); font-weight: 700; }

  /* flags row */
  .flags { display: inline-flex; gap: 12px; }
  .flag {
    display: inline-flex;
    flex-direction: column;
    width: 72px; height: 46px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.45);
    overflow: hidden;
    border: 1px solid rgba(168,174,187,0.25);
    position: relative;
  }
  .flag span { flex: 1; display: block; }

  /* Russia — white / blue / red */
  .flag.ru .w { background: #F3F5F9; }
  .flag.ru .b { background: #0039A6; }
  .flag.ru .r { background: #D52B1E; }

  /* Saudi Arabia — green with emblem-placeholder (shahada bar + sword) */
  .flag.sa { background: #006C35; }
  .flag.sa::before {
    content: "";
    position: absolute;
    left: 10%; right: 10%;
    top: 40%; height: 2px;
    background: #F3F5F9;
    box-shadow: 0 6px 0 #F3F5F9;
  }
  .flag.sa::after {
    content: "";
    position: absolute;
    left: 12%; right: 12%;
    bottom: 22%; height: 2px;
    background: #F3F5F9;
  }

  /* USA — stripes + canton */
  .flag.us {
    background: repeating-linear-gradient(
      to bottom,
      #D52B1E 0, #D52B1E 14.28%,
      #F3F5F9 14.28%, #F3F5F9 28.57%
    );
  }
  .flag.us::before {
    content: "";
    position: absolute;
    left: 0; top: 0;
    width: 40%; height: 53.8%;
    background: #0039A6;
  }
  .flag.us::after {
    content: "★ ★ ★ ★\A★ ★ ★ ★";
    white-space: pre;
    position: absolute;
    left: 0; top: 0;
    width: 40%; height: 53.8%;
    color: #F3F5F9;
    font-size: 7px;
    line-height: 1.6;
    text-align: center;
    padding-top: 4px;
    letter-spacing: 1px;
  }

  /* chips */
  .chips {
    margin-top: 32px;
    display: inline-flex; gap: 18px; flex-wrap: wrap;
  }
  .chip {
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--paper);
    padding: 12px 18px;
    border: 1px solid var(--rambler-dim);
  }
  .chip.accent { color: var(--rambler); border-color: var(--rambler-mid); }
</style>
</head>
<body>
<script>if (location.hash === "#preview") document.body.classList.add("preview");</script>

<div class="slide" aria-label="Никита Руленко — кто я">
  <div class="mark-bg right" aria-hidden="true">/</div>

  <div class="top">
    <div class="lhs">
      <span class="dot" aria-hidden="true"></span>
      <span>Intro <span class="slash">/</span> About</span>
    </div>
    <div class="rhs">Heisenbug · 2026</div>
  </div>
  <div class="rule-top" aria-hidden="true"></div>

  <div class="layout">
    <div class="photo-card">
      <div class="photo-tag"><span class="muted">//</span>&nbsp;speaker&nbsp;·&nbsp;2026</div>
      <span class="corner tl" aria-hidden="true"></span>
      <span class="corner tr" aria-hidden="true"></span>
      <span class="corner bl" aria-hidden="true"></span>
      <span class="corner br" aria-hidden="true"></span>
      <img src="../photo.png" alt="Никита Руленко">
    </div>

    <div class="identity">
      <div class="kicker">
        <span class="bar" aria-hidden="true"></span>
        <span>Кто&nbsp;я<span class="q">?</span></span>
      </div>

      <h1 class="name">
        Никита<br>
        <span class="ln2">Руленко</span>
      </h1>

      <div class="meta-row">
        <span class="flags" aria-label="Опыт: Россия, Саудовская Аравия, США">
          <span class="flag ru" aria-label="Россия">
            <span class="w"></span><span class="b"></span><span class="r"></span>
          </span>
          <span class="flag sa" aria-label="Саудовская Аравия"></span>
          <span class="flag us" aria-label="США"></span>
        </span>
        <span class="role"><b>Ведущий&nbsp;инженер</b> производительности</span>
      </div>

      <div class="chips" aria-hidden="true">
        <span class="chip accent">Context Recovery</span>
        <span class="chip">6+ лет в AI·QA</span>
      </div>
    </div>
  </div>

  <div class="rule-bot" aria-hidden="true"></div>
  <div class="footer">
    <div class="l"><span class="mark">/</span><span>Rambler</span></div>
    <div class="r"><span>Heisenbug</span><span class="mark">/</span></div>
  </div>
</div>
</body>
</html>
