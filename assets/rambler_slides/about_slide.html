<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Кто я? · Heisenbug 2026</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./_base.css">
<style>
  .hero h1 {
    font-size: 340px;
    line-height: 0.88;
    letter-spacing: -0.055em;
    display: flex; align-items: baseline; gap: 40px; flex-wrap: wrap;
  }
  .hero h1 .q {
    color: var(--rambler);
    font-weight: 800;
  }
  .chip-row {
    margin-top: 72px;
    display: inline-flex; gap: 24px; flex-wrap: wrap;
  }
  .chip {
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: 18px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--paper);
    padding: 14px 22px;
    border: 1px solid var(--rambler-dim);
  }
  .chip.accent { color: var(--rambler); border-color: var(--rambler-mid); }
</style>
</head>
<body>
<script>if (location.hash === "#preview") document.body.classList.add("preview");</script>

<div class="slide" aria-label="Кто я">
  <div class="mark-bg right" aria-hidden="true">/</div>

  <div class="top">
    <div class="lhs">
      <span class="dot" aria-hidden="true"></span>
      <span>Intro <span class="slash">/</span> About</span>
    </div>
    <div class="rhs">Heisenbug · 2026</div>
  </div>
  <div class="rule-top" aria-hidden="true"></div>

  <div class="hero">
    <div class="eyebrow">
      <span class="bar" aria-hidden="true"></span>
      <span>Слайд <span class="hi">· Знакомство</span></span>
    </div>

    <h1>
      <span>Кто&nbsp;я</span><span class="q">?</span>
    </h1>

    <div class="chip-row" aria-hidden="true">
      <span class="chip accent">Nikita Rulenko</span>
      <span class="chip">Helixir · Founder</span>
    </div>
  </div>

  <div class="rule-bot" aria-hidden="true"></div>
  <div class="footer">
    <div class="l"><span class="mark">/</span><span>Rambler</span></div>
    <div class="r"><span>Heisenbug</span><span class="mark">/</span></div>
  </div>
</div>
</body>
</html>
