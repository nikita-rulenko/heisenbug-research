<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Никита Руленко · Heisenbug 2026</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./_base.css">
<style>
  /* 2-col layout: photo + identity */
  .layout {
    position: absolute;
    left: 96px; right: 96px;
    top: 150px; bottom: 130px;
    display: grid;
    grid-template-columns: 560px 1fr;
    gap: 90px;
    align-items: center;
    z-index: 5;
  }

  /* photo card (square with crosshair corners) */
  .photo-card {
    position: relative;
    width: 520px; height: 520px;
    justify-self: center;
  }
  .photo-card img {
    display: block;
    width: 100%; height: 100%;
    object-fit: cover;
    box-shadow: 0 30px 80px rgba(0,0,0,0.75), 0 10px 24px rgba(0,0,0,0.5);
  }
  .photo-card .corner {
    position: absolute;
    width: 38px; height: 38px;
    pointer-events: none;
  }
  .photo-card .corner::before,
  .photo-card .corner::after {
    content: ""; position: absolute;
    background: var(--rambler);
    box-shadow: 0 0 10px var(--rambler);
  }
  .photo-card .corner::before { left: 0; top: 0; width: 100%; height: 2px; }
  .photo-card .corner::after  { left: 0; top: 0; width: 2px; height: 100%; }
  .photo-card .corner.tl { left: -18px; top: -18px; }
  .photo-card .corner.tr { right: -18px; top: -18px; transform: scaleX(-1); }
  .photo-card .corner.bl { left: -18px; bottom: -18px; transform: scaleY(-1); }
  .photo-card .corner.br { right: -18px; bottom: -18px; transform: scale(-1,-1); }

  /* tiny meta label above photo */
  .photo-tag {
    position: absolute;
    left: -4px; top: -52px;
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--rambler);
  }
  .photo-tag .muted { color: var(--aluminium); }

  /* right column — identity */
  .identity { display: flex; flex-direction: column; justify-content: center; gap: 0; }

  .kicker {
    display: inline-flex; align-items: center; gap: 18px;
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: 15px;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--aluminium);
    margin-bottom: 24px;
  }
  .kicker .bar { width: 56px; height: 2px; background: var(--rambler); }
  .kicker .q { color: var(--rambler); font-weight: 700; }

  .name {
    font-family: "Unbounded", sans-serif;
    font-weight: 800;
    font-size: 176px;
    line-height: 0.88;
    letter-spacing: -0.05em;
    color: var(--paper);
    margin-bottom: 36px;
  }
  .name .ln2 { color: var(--rambler); display: block; }

  .meta-row {
    display: flex; align-items: center; gap: 24px;
    flex-wrap: wrap;
  }
  .role-row { margin-top: 22px; }
  .role {
    font-family: "Manrope", sans-serif;
    font-weight: 500;
    font-size: 30px;
    letter-spacing: 0.01em;
    color: var(--aluminium);
  }
  .role b { color: var(--paper); font-weight: 700; }

  /* flags row — real PNG flags */
  .flags { display: inline-flex; gap: 22px; align-items: center; }
  .flag {
    display: block;
    width: 168px; height: 112px;
    object-fit: cover;
    box-shadow: 0 14px 34px rgba(0,0,0,0.6), 0 3px 10px rgba(0,0,0,0.4);
    border: 1px solid rgba(168,174,187,0.3);
  }

  /* chips */
  .chips {
    margin-top: 32px;
    display: inline-flex; gap: 18px; flex-wrap: wrap;
  }
  .chip {
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--paper);
    padding: 12px 18px;
    border: 1px solid var(--rambler-dim);
  }
  .chip.accent { color: var(--rambler); border-color: var(--rambler-mid); }
</style>
</head>
<body>
<script>if (location.hash === "#preview") document.body.classList.add("preview");</script>

<div class="slide" aria-label="Никита Руленко — кто я">
  <div class="mark-bg right" aria-hidden="true">/</div>

  <div class="top">
    <div class="lhs">
      <span class="dot" aria-hidden="true"></span>
      <span>Intro <span class="slash">/</span> About</span>
    </div>
    <div class="rhs">Heisenbug · 2026</div>
  </div>
  <div class="rule-top" aria-hidden="true"></div>

  <div class="layout">
    <div class="photo-card">
      <div class="photo-tag"><span class="muted">//</span>&nbsp;speaker&nbsp;·&nbsp;2026</div>
      <span class="corner tl" aria-hidden="true"></span>
      <span class="corner tr" aria-hidden="true"></span>
      <span class="corner bl" aria-hidden="true"></span>
      <span class="corner br" aria-hidden="true"></span>
      <img src="../photo.png" alt="Никита Руленко">
    </div>

    <div class="identity">
      <div class="kicker">
        <span class="bar" aria-hidden="true"></span>
        <span>Кто&nbsp;я<span class="q">?</span></span>
      </div>

      <h1 class="name">
        Никита<br>
        <span class="ln2">Руленко</span>
      </h1>

      <div class="meta-row">
        <span class="flags" aria-label="Опыт: Россия, Саудовская Аравия, США">
          <img class="flag" src="../flags/ru.png" alt="Россия">
          <img class="flag" src="../flags/sa.png" alt="Саудовская Аравия">
          <img class="flag" src="../flags/us.png" alt="США">
        </span>
      </div>
      <div class="role-row">
        <span class="role"><b>Ведущий&nbsp;инженер</b>&nbsp;производительности</span>
      </div>

      <div class="chips" aria-hidden="true">
        <span class="chip accent">Context Recovery</span>
        <span class="chip">6+ лет в AI·QA</span>
      </div>
    </div>
  </div>

  <div class="rule-bot" aria-hidden="true"></div>
  <div class="footer">
    <div class="l"><span class="mark">/</span><span>Rambler</span></div>
    <div class="r"><span>Heisenbug</span><span class="mark">/</span></div>
  </div>
</div>
</body>
</html>
