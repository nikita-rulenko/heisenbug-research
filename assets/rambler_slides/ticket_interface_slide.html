<link rel="stylesheet" href="./_base.css">
<style>
  .hero h1 {
    font-size: 200px;
    line-height: 0.9;
    letter-spacing: -0.05em;
  }
  .hero h1 .w { color: var(--paper); font-weight: 700; }

      <span>Protocol <span class="slash">/</span> Interface</span>
