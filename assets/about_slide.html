<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Кто я? · Никита Руленко</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,500;0,600;0,700;0,900;1,500;1,700;1,900&family=Courier+Prime:ital,wght@0,400;0,700&display=swap"
  rel="stylesheet">
<style>
  /* ────────── tokens ─────────────────────────────── */
  :root {
    --paper:      #E8DCBA;
    --paper-2:    #DFD2AA;
    --ink:        #1A150B;
    --ink-mute:   #6B6042;
    --ink-soft:   #453E28;
    --navy:       #1F3A5F;
    --stamp:      #A83328;

    --slide-w: 1920px;
    --slide-h: 1080px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { background: var(--paper-2); }
  body { font-family: "Crimson Pro", serif; color: var(--ink); }

  body.preview { display: grid; place-items: center; padding: 40px; min-height: 100vh; background: #1a1814; }
  body.preview .slide { box-shadow: 0 60px 180px rgba(0,0,0,0.75), 0 15px 40px rgba(0,0,0,0.4); }

  /* ────────── slide ─────────────────────────────── */
  .slide {
    position: relative;
    width: var(--slide-w); height: var(--slide-h);
    overflow: hidden;
    background:
      repeating-linear-gradient(
        45deg,
        transparent 0 24px,
        rgba(31, 58, 95, 0.018) 24px 25px
      ),
      repeating-linear-gradient(
        -45deg,
        transparent 0 24px,
        rgba(31, 58, 95, 0.018) 24px 25px
      ),
      radial-gradient(ellipse 60% 60% at 90% 10%, rgba(169, 128, 65, 0.10), transparent 55%),
      radial-gradient(ellipse 60% 60% at 10% 90%, rgba(31, 58, 95, 0.05), transparent 55%),
      linear-gradient(165deg, #EDE1C0 0%, #E5D9B6 55%, #D9CCA4 100%);
  }

  /* зерно */
  .slide::before {
    content: "";
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.08  0 0 0 0 0.07  0 0 0 0 0.05  0 0 0 0.15 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    mix-blend-mode: multiply;
    opacity: 0.5;
    pointer-events: none;
    z-index: 1;
  }

  /* одна лёгкая рамка по периметру */
  .slide::after {
    content: "";
    position: absolute;
    top: 64px; bottom: 64px;
    left: 72px; right: 72px;
    border: 1.5px solid rgba(31, 58, 95, 0.22);
    pointer-events: none;
    z-index: 1;
  }

  /* ────────── минимальная верхняя метка ─────────── */
  .top-mark {
    position: absolute;
    top: 100px; left: 120px;
    display: inline-flex; align-items: center; gap: 14px;
    font-family: "Courier Prime", monospace;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--ink-mute);
    z-index: 3;
  }
  .top-mark .sq {
    width: 10px; height: 10px;
    background: var(--stamp);
    transform: rotate(45deg);
  }
  .top-mark b { color: var(--ink); font-weight: 700; }

  .top-event {
    position: absolute;
    top: 100px; right: 120px;
    font-family: "Courier Prime", monospace;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--ink-mute);
    z-index: 3;
  }
  .top-event b { color: var(--stamp); font-weight: 700; }

  /* ────────── hero "Кто я?" ──────────────────────── */
  .who {
    position: absolute;
    top: 170px;
    left: 120px;
    font-family: "Crimson Pro", serif;
    font-weight: 900;
    font-style: italic;
    font-size: 184px;
    line-height: 1;
    letter-spacing: -0.025em;
    color: var(--ink);
    z-index: 3;
  }
  .who::after {
    content: "";
    display: block;
    width: 120px; height: 4px;
    background: var(--stamp);
    margin-top: 32px;
  }

  /* ────────── data column ────────────────────────── */
  .data {
    position: absolute;
    top: 470px;
    left: 120px;
    right: 900px;
    z-index: 3;
  }

  .name {
    font-family: "Crimson Pro", serif;
    font-weight: 900;
    font-style: normal;
    font-size: 84px;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .name .given {
    font-weight: 500;
    font-style: italic;
    color: var(--navy);
  }

  .role {
    margin-top: 40px;
    font-family: "Crimson Pro", serif;
    font-weight: 600;
    font-size: 46px;
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: var(--ink);
    max-width: 880px;
  }
  .role em {
    font-style: italic;
    font-weight: 700;
    color: var(--stamp);
  }

  .org {
    margin-top: 26px;
    font-family: "Crimson Pro", serif;
    font-weight: 600;
    font-size: 38px;
    line-height: 1.25;
    color: var(--ink);
  }
  .org .dot { color: var(--stamp); margin: 0 8px; }
  .org em {
    font-style: italic;
    font-weight: 700;
    color: var(--stamp);
  }

  /* ────────── флаги ─────────────────────────────── */
  .flags {
    position: absolute;
    left: 120px;
    bottom: 130px;
    display: flex;
    align-items: center;
    gap: 20px;
    z-index: 3;
  }
  .flags .lbl {
    font-family: "Courier Prime", monospace;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-right: 14px;
  }
  .flag {
    width: 128px; height: 80px;
    border: 2px solid var(--ink);
    box-shadow: 0 3px 0 var(--paper-2), 0 6px 12px rgba(26, 20, 10, 0.12);
    overflow: hidden;
    position: relative;
  }
  .flag.tilt-1 { transform: rotate(-1.8deg); }
  .flag.tilt-2 { transform: rotate( 1.2deg); }
  .flag.tilt-3 { transform: rotate(-0.8deg); }

  /* ────────── photo (справа) ─────────────────────── */
  .photo {
    position: absolute;
    right: 120px;
    top: 170px;
    bottom: 130px;
    width: 760px;
    display: flex;
    align-items: flex-start;
    justify-content: flex-end;
    z-index: 3;
  }
  .photo-inner {
    position: relative;
    max-width: 100%;
    max-height: 100%;
    display: inline-block;
    padding: 14px;
    background: var(--paper);
    border: 2.5px solid var(--navy);
    box-shadow:
      0 3px 0 var(--paper-2),
      0 20px 40px rgba(26, 20, 10, 0.25),
      0 8px 16px rgba(26, 20, 10, 0.12);
  }
  .photo-inner img {
    display: block;
    max-width: 720px;
    max-height: 720px;
    width: auto;
    height: auto;
    object-fit: contain;
  }

  /* fallback placeholder, если photo.jpg не найден */
  .photo-inner .ph-fallback {
    display: none;
    width: 540px;
    height: 680px;
    background:
      repeating-linear-gradient(
        45deg,
        rgba(31, 58, 95, 0.04) 0 12px,
        transparent 12px 24px
      ),
      var(--paper-2);
    align-items: center; justify-content: center;
    color: var(--navy);
    font-family: "Crimson Pro", serif;
    font-weight: 700;
    font-size: 72px;
    letter-spacing: -0.02em;
    font-style: italic;
  }

  /* углы-меточки у фото (Г-скобки) */
  .photo-inner .corner {
    position: absolute;
    width: 22px; height: 22px;
    border: 2px solid var(--stamp);
    z-index: 2;
  }
  .photo-inner .corner.tl { top: -2px; left: -2px;  border-right: 0; border-bottom: 0; }
  .photo-inner .corner.tr { top: -2px; right: -2px; border-left: 0;  border-bottom: 0; }
  .photo-inner .corner.bl { bottom: -2px; left: -2px;  border-right: 0; border-top: 0; }
  .photo-inner .corner.br { bottom: -2px; right: -2px; border-left: 0;  border-top: 0; }

  /* круглая печать поверх фото справа-снизу */
  .photo-stamp {
    position: absolute;
    right: -40px;
    bottom: -40px;
    width: 170px; height: 170px;
    transform: rotate(-12deg);
    z-index: 4;
    pointer-events: none;
    opacity: 0.85;
  }
  .photo-stamp-circle {
    width: 100%; height: 100%;
    border: 3.5px solid var(--stamp);
    border-radius: 50%;
    display: grid; place-items: center;
    color: var(--stamp);
    text-align: center;
    padding: 14px;
    position: relative;
    background: rgba(232, 220, 186, 0.65);
  }
  .photo-stamp-circle::before {
    content: "";
    position: absolute; inset: 6px;
    border: 1.5px solid var(--stamp);
    border-radius: 50%;
    opacity: 0.6;
  }
  .photo-stamp-circle::after {
    content: "";
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='170' height='170'><filter id='sn'><feTurbulence type='fractalNoise' baseFrequency='1.3' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.91  0 0 0 0 0.85  0 0 0 0 0.73  0 0 0 0.55 0'/></filter><rect width='100%25' height='100%25' filter='url(%23sn)'/></svg>");
    border-radius: 50%;
    mix-blend-mode: screen;
    opacity: 0.7;
  }
  .photo-stamp-circle .top,
  .photo-stamp-circle .bot {
    font-family: "Courier Prime", monospace;
    font-weight: 700;
    font-size: 9px;
    letter-spacing: 0.38em;
    text-transform: uppercase;
  }
  .photo-stamp-circle .mid {
    font-family: "Crimson Pro", serif;
    font-weight: 900;
    font-style: italic;
    font-size: 30px;
    line-height: 0.95;
    margin: 4px 0;
  }
  .photo-stamp-circle .dot {
    width: 4px; height: 4px;
    background: var(--stamp);
    border-radius: 50%;
    margin: 3px auto;
  }
</style>
</head>
<body>
<script>
  if (location.hash === "#preview") document.body.classList.add("preview");
</script>

<div class="slide" aria-label="Слайд: Кто я? Никита Руленко">

  <!-- минимальная верхняя шапка -->
  <div class="top-mark">
    <span class="sq" aria-hidden="true"></span>
    Досье&nbsp;·&nbsp;<b>HLX&nbsp;/&nbsp;042</b>
  </div>
  <div class="top-event"><b>Heisenbug</b>&nbsp;·&nbsp;2026</div>

  <!-- hero -->
  <h1 class="who">Кто&nbsp;я?</h1>

  <!-- data -->
  <div class="data">
    <div class="name">РУЛЕНКО&nbsp;<span class="given">Никита</span></div>

    <div class="role">
      Ведущий инженер <em>производительности</em>
    </div>

    <div class="org">
      Rambler&nbsp;·&nbsp;Почта<span class="dot">·</span><em>6+&nbsp;лет</em> в&nbsp;индустрии
    </div>
  </div>

  <!-- фото справа -->
  <div class="photo">
    <div class="photo-inner">
      <span class="corner tl" aria-hidden="true"></span>
      <span class="corner tr" aria-hidden="true"></span>
      <span class="corner bl" aria-hidden="true"></span>
      <span class="corner br" aria-hidden="true"></span>

      <img src="./photo.jpg" alt="Фото Никиты Руленко"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="ph-fallback">НР</div>

      <div class="photo-stamp" aria-hidden="true">
        <div class="photo-stamp-circle">
          <div style="display:flex; flex-direction:column; align-items:center;">
            <div class="top">Speaker · 2026</div>
            <div class="dot"></div>
            <div class="mid">Heisen-<br>bug</div>
            <div class="dot"></div>
            <div class="bot">MMXXVI</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- флаги территорий -->
  <div class="flags">
    <div class="lbl">Территории</div>

    <div class="flag tilt-1">
      <svg width="100%" height="100%" viewBox="0 0 3 2" preserveAspectRatio="none">
        <rect width="3" height="0.667"                 fill="#FFFFFF"/>
        <rect width="3" height="0.667" y="0.667"       fill="#0039A6"/>
        <rect width="3" height="0.667" y="1.333"       fill="#D52B1E"/>
      </svg>
    </div>

    <div class="flag tilt-2">
      <svg width="100%" height="100%" viewBox="0 0 3 2" preserveAspectRatio="none">
        <rect width="3" height="2" fill="#006C35"/>
        <text x="1.5" y="0.88" font-family="serif" font-size="0.34" font-style="italic" fill="#fff" text-anchor="middle" font-weight="700">
          لا إله إلا الله
        </text>
        <rect x="0.35" y="1.18" width="2.30" height="0.05" fill="#fff"/>
        <polygon points="2.65,1.205 2.80,1.12 2.80,1.27" fill="#fff"/>
      </svg>
    </div>

    <div class="flag tilt-3">
      <svg width="100%" height="100%" viewBox="0 0 3 2" preserveAspectRatio="none">
        <rect width="3" height="2" fill="#FFFFFF"/>
        <rect width="3" height="0.154"                 fill="#BF0A30"/>
        <rect width="3" height="0.154" y="0.308"       fill="#BF0A30"/>
        <rect width="3" height="0.154" y="0.616"       fill="#BF0A30"/>
        <rect width="3" height="0.154" y="0.924"       fill="#BF0A30"/>
        <rect width="3" height="0.154" y="1.232"       fill="#BF0A30"/>
        <rect width="3" height="0.154" y="1.540"       fill="#BF0A30"/>
        <rect width="3" height="0.154" y="1.846"       fill="#BF0A30"/>
        <rect x="0" y="0" width="1.2" height="1.077" fill="#002868"/>
        <g fill="#fff">
          <circle cx="0.2" cy="0.18" r="0.045"/><circle cx="0.4" cy="0.18" r="0.045"/>
          <circle cx="0.6" cy="0.18" r="0.045"/><circle cx="0.8" cy="0.18" r="0.045"/>
          <circle cx="1.0" cy="0.18" r="0.045"/>
          <circle cx="0.3" cy="0.36" r="0.045"/><circle cx="0.5" cy="0.36" r="0.045"/>
          <circle cx="0.7" cy="0.36" r="0.045"/><circle cx="0.9" cy="0.36" r="0.045"/>
          <circle cx="0.2" cy="0.54" r="0.045"/><circle cx="0.4" cy="0.54" r="0.045"/>
          <circle cx="0.6" cy="0.54" r="0.045"/><circle cx="0.8" cy="0.54" r="0.045"/>
          <circle cx="1.0" cy="0.54" r="0.045"/>
          <circle cx="0.3" cy="0.72" r="0.045"/><circle cx="0.5" cy="0.72" r="0.045"/>
          <circle cx="0.7" cy="0.72" r="0.045"/><circle cx="0.9" cy="0.72" r="0.045"/>
          <circle cx="0.2" cy="0.90" r="0.045"/><circle cx="0.4" cy="0.90" r="0.045"/>
          <circle cx="0.6" cy="0.90" r="0.045"/><circle cx="0.8" cy="0.90" r="0.045"/>
          <circle cx="1.0" cy="0.90" r="0.045"/>
        </g>
      </svg>
    </div>
  </div>

</div>
</body>
</html>
